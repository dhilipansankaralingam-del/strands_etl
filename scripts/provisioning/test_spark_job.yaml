# Test SparkApplication for EKS + Karpenter
# This is the format generated by the ETL framework when target_platform = "eks"
#
# Usage:
#   kubectl apply -f test_spark_job.yaml
#   kubectl get sparkapplication -n spark-jobs
#   kubectl logs -f <pod-name> -n spark-jobs
#
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: test-spark-pi
  namespace: spark-jobs
spec:
  type: Scala
  mode: cluster
  image: apache/spark:3.5.0  # Replace with your ECR image
  imagePullPolicy: Always
  mainClass: org.apache.spark.examples.SparkPi
  mainApplicationFile: local:///opt/spark/examples/jars/spark-examples_2.12-3.5.0.jar
  arguments:
    - "1000"
  sparkVersion: "3.5.0"

  # Karpenter will provision nodes matching these requirements
  restartPolicy:
    type: OnFailure
    onFailureRetries: 3
    onFailureRetryInterval: 10
    onSubmissionFailureRetries: 5
    onSubmissionFailureRetryInterval: 20

  driver:
    cores: 1
    coreLimit: "1200m"
    memory: "2g"
    labels:
      version: "3.5.0"
    serviceAccount: spark
    # Karpenter node selector (optional - will work without)
    nodeSelector:
      workload-type: spark
    tolerations:
      - key: "workload-type"
        operator: "Equal"
        value: "spark"
        effect: "NoSchedule"

  executor:
    cores: 2
    coreLimit: "2400m"
    memory: "4g"
    instances: 3
    labels:
      version: "3.5.0"
    # Karpenter will auto-scale nodes for executors
    nodeSelector:
      workload-type: spark
    tolerations:
      - key: "workload-type"
        operator: "Equal"
        value: "spark"
        effect: "NoSchedule"

  dynamicAllocation:
    enabled: true
    initialExecutors: 2
    minExecutors: 1
    maxExecutors: 10

---
# Example: PySpark ETL Job (generated by code_conversion_agent)
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: enterprise-etl-job
  namespace: spark-jobs
  labels:
    app: enterprise-etl
    framework: strands-etl
spec:
  type: Python
  mode: cluster
  # Use your ECR image with S3 support
  image: "123456789012.dkr.ecr.us-east-1.amazonaws.com/spark-etl:latest"
  imagePullPolicy: Always

  # Path to your converted PySpark script (uploaded to S3)
  mainApplicationFile: "s3a://etl-framework-scripts/converted/complex_enterprise_sales_eks.py"

  sparkVersion: "3.5.0"

  # Spark configuration for S3 and performance
  sparkConf:
    # S3 access
    "spark.hadoop.fs.s3a.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "spark.hadoop.fs.s3a.aws.credentials.provider": "com.amazonaws.auth.WebIdentityTokenCredentialsProvider"

    # Performance tuning
    "spark.sql.adaptive.enabled": "true"
    "spark.sql.adaptive.coalescePartitions.enabled": "true"
    "spark.sql.adaptive.skewJoin.enabled": "true"
    "spark.sql.shuffle.partitions": "400"
    "spark.dynamicAllocation.enabled": "true"
    "spark.dynamicAllocation.shuffleTracking.enabled": "true"

    # Delta Lake support
    "spark.sql.extensions": "io.delta.sql.DeltaSparkSessionExtension"
    "spark.sql.catalog.spark_catalog": "org.apache.spark.sql.delta.catalog.DeltaCatalog"

    # Glue Catalog (optional)
    "spark.hadoop.hive.metastore.client.factory.class": "com.amazonaws.glue.catalog.metastore.AWSGlueDataCatalogHiveClientFactory"

  restartPolicy:
    type: OnFailure
    onFailureRetries: 3
    onFailureRetryInterval: 10

  driver:
    cores: 2
    coreLimit: "2400m"
    memory: "8g"
    memoryOverhead: "2g"
    labels:
      version: "3.5.0"
      job: enterprise-etl
    serviceAccount: spark-s3  # Service account with S3 access
    nodeSelector:
      workload-type: spark

  executor:
    cores: 4
    coreLimit: "4800m"
    memory: "12g"
    memoryOverhead: "3g"
    instances: 20  # From glue_config.number_of_workers
    labels:
      version: "3.5.0"
      job: enterprise-etl
    nodeSelector:
      workload-type: spark

  # Dynamic allocation: Karpenter will provision/deprovision nodes as needed
  dynamicAllocation:
    enabled: true
    initialExecutors: 5
    minExecutors: 2
    maxExecutors: 40  # 2x the base instances

  # Job monitoring
  monitoring:
    exposeDriverMetrics: true
    exposeExecutorMetrics: true
    prometheus:
      jmxExporterJar: "/prometheus/jmx_prometheus_javaagent-0.11.0.jar"
      port: 8090
